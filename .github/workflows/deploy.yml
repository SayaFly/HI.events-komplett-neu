# ============================================================
# CI/CD – Deploy to Windows Server 2022 / IIS
# ============================================================
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   VITE_API_URL          Frontend API URL  (e.g. https://api.dev-veranstaltungen.de/api)
#   APP_KEY               Laravel APP_KEY   (base64:…)  — generate once with `php artisan key:generate --show`
#   JWT_SECRET            JWT signing secret             — generate once with `php artisan jwt:secret --show`
#   APP_URL               Backend URL       (e.g. https://api.dev-veranstaltungen.de)
#   DB_HOST               DB host           (default: 127.0.0.1)
#   DB_PORT               DB port           (default: 3306)
#   DB_DATABASE           DB name           (e.g. event_veranstaltungen)
#   DB_USERNAME           DB user
#   DB_PASSWORD           DB password
#   MAIL_PASSWORD         SMTP password
#   DEPLOY_BACKEND_PATH   Absolute path on the server  (e.g. C:\inetpub\api.dev-veranstaltungen.de)
#   DEPLOY_FRONTEND_PATH  Absolute path on the server  (e.g. C:\inetpub\dev-veranstaltungen.de)
#   IIS_BACKEND_POOL      IIS app-pool name for the API  (e.g. event-api)
#   IIS_FRONTEND_POOL     IIS app-pool name for the SPA  (e.g. event-frontend)
#   IIS_APP_POOL_USER     App-pool identity used for file permissions
#                         (e.g. "IIS AppPool\event-api")
#
# Pipeline overview:
#   build  – Runs on a GitHub-hosted windows-latest runner.
#            Installs Composer & npm dependencies, compiles the Vite frontend,
#            and uploads two artifacts: "backend-build" and "frontend-build".
#
#   deploy – Runs on the self-hosted [Windows, IIS] runner on the target server.
#            Downloads the artifacts, robocopy-deploys to IIS paths, writes the
#            production .env, runs migrations, sets permissions, warms caches,
#            restarts app-pools, and smoke-tests the health endpoint.
#
# Prerequisites on the Windows Server 2022 runner:
#   • GitHub Actions self-hosted runner installed and labelled "IIS"
#     (runs as a user with local Administrator rights)
#   • All other components (PHP, Composer, Node.js, IIS, URL Rewrite …)
#     are installed automatically by .github/scripts/setup-iis.ps1 –
#     run the "Setup IIS" workflow ONCE before the first deploy.
# ============================================================

name: CI/CD – Windows Server 2022 / IIS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run database migrations?'
        required: true
        default: 'true'
        type: boolean
      run_seed:
        description: 'Run database seeder (only on first deploy)?'
        required: false
        default: 'false'
        type: boolean

# Least-privilege defaults for the GITHUB_TOKEN
permissions: {}

# Ensure only one deployment runs at a time; queue new runs instead of cancelling.
concurrency:
  group: production-deploy
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 – Build
  #         Runs on a GitHub-hosted Windows runner so the self-hosted IIS
  #         runner is not occupied during the potentially long build phase.
  #         Produces two artifacts consumed by the deploy job:
  #           • backend-build  – vendor/ directory included, ready to robocopy
  #           • frontend-build – compiled dist/ + web.config
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (GitHub-hosted runner)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      # ── 1  Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2  Backend – Composer ─────────────────────────────────────────────
      - name: Install Composer dependencies
        shell: pwsh
        working-directory: backend
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress
          Write-Host "Composer install complete."

      # ── 3  Frontend – Node / Vite ─────────────────────────────────────────
      - name: Write frontend .env
        shell: pwsh
        working-directory: frontend
        run: |
          "VITE_API_URL=${{ secrets.VITE_API_URL }}" | Set-Content .env
          Write-Host "Frontend .env written."

      - name: Install npm dependencies
        shell: pwsh
        working-directory: frontend
        run: npm ci --no-audit

      - name: Build frontend
        shell: pwsh
        working-directory: frontend
        run: npm run build

      - name: Copy IIS web.config into dist
        shell: pwsh
        working-directory: frontend
        run: Copy-Item web.config dist\web.config -Force

      # ── 4  Upload artifacts ───────────────────────────────────────────────
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/
          retention-days: 1

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 – Deploy
  #         Runs on the self-hosted IIS runner on the production server.
  #         Downloads the build artifacts produced by the build job and
  #         performs all IIS-specific deployment steps.
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to IIS (Windows Server 2022)
    needs: build
    runs-on: [self-hosted, Windows, IIS]
    environment: production
    permissions:
      contents: read
    env:
      BACKEND_ARTIFACT_PATH:  ${{ runner.temp }}\backend
      FRONTEND_ARTIFACT_PATH: ${{ runner.temp }}\frontend-dist

    steps:
      # ── 1  Download build artifacts ───────────────────────────────────────
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ${{ env.BACKEND_ARTIFACT_PATH }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_ARTIFACT_PATH }}

      # ── 2  Deploy files to IIS paths ──────────────────────────────────────
      - name: Deploy backend files
        shell: pwsh
        run: |
          $src = "${{ env.BACKEND_ARTIFACT_PATH }}"
          $dst = "${{ secrets.DEPLOY_BACKEND_PATH }}"
          # robocopy exit codes 0-7 indicate success (bit flags for copied/skipped/etc.)
          robocopy $src $dst /MIR /XD ".git" "tests" /XF ".gitignore" /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -gt 7) { throw "robocopy failed with exit code $LASTEXITCODE" }
          Write-Host "Backend deployed to $dst"

      - name: Deploy frontend files
        shell: pwsh
        run: |
          $src = "${{ env.FRONTEND_ARTIFACT_PATH }}"
          $dst = "${{ secrets.DEPLOY_FRONTEND_PATH }}"
          robocopy $src $dst /MIR /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -gt 7) { throw "robocopy failed with exit code $LASTEXITCODE" }
          Write-Host "Frontend deployed to $dst"

      # ── 3  Write production .env ──────────────────────────────────────────
      - name: Configure backend .env
        shell: pwsh
        run: |
          $envFile = "${{ secrets.DEPLOY_BACKEND_PATH }}\.env"

          # Start from the example if .env does not exist yet
          if (-not (Test-Path $envFile)) {
              Copy-Item "${{ secrets.DEPLOY_BACKEND_PATH }}\.env.example" $envFile -Force
          }

          $c = Get-Content $envFile -Raw

          # Core settings
          $c = $c -replace '(?m)^APP_KEY=.*',       'APP_KEY=${{ secrets.APP_KEY }}'
          $c = $c -replace '(?m)^APP_URL=.*',       'APP_URL=${{ secrets.APP_URL }}'
          $c = $c -replace '(?m)^APP_ENV=.*',       'APP_ENV=production'
          $c = $c -replace '(?m)^APP_DEBUG=.*',     'APP_DEBUG=false'

          # Database
          $c = $c -replace '(?m)^DB_CONNECTION=.*', 'DB_CONNECTION=mariadb'
          $c = $c -replace '(?m)^DB_HOST=.*',       'DB_HOST=${{ secrets.DB_HOST }}'
          $c = $c -replace '(?m)^DB_PORT=.*',       'DB_PORT=${{ secrets.DB_PORT }}'
          $c = $c -replace '(?m)^DB_DATABASE=.*',   'DB_DATABASE=${{ secrets.DB_DATABASE }}'
          $c = $c -replace '(?m)^DB_USERNAME=.*',   'DB_USERNAME=${{ secrets.DB_USERNAME }}'
          $c = $c -replace '(?m)^DB_PASSWORD=.*',   'DB_PASSWORD=${{ secrets.DB_PASSWORD }}'

          # Mail
          $c = $c -replace '(?m)^MAIL_PASSWORD=.*', 'MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}'

          # JWT (append if not present)
          if ($c -notmatch '(?m)^JWT_SECRET=') {
              $c += "`nJWT_SECRET=${{ secrets.JWT_SECRET }}`n"
          } else {
              $c = $c -replace '(?m)^JWT_SECRET=.*', 'JWT_SECRET=${{ secrets.JWT_SECRET }}'
          }

          Set-Content $envFile $c -NoNewline
          Write-Host "Backend .env configured."

      # ── 4  Database migrations ───────────────────────────────────────────
      - name: Run database migrations
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_migrations == 'true' }}
        shell: pwsh
        run: |
          Set-Location "${{ secrets.DEPLOY_BACKEND_PATH }}"
          php artisan migrate --force --ansi
          Write-Host "Migrations completed."

      - name: Run database seeder
        if: ${{ github.event.inputs.run_seed == 'true' }}
        shell: pwsh
        run: |
          Set-Location "${{ secrets.DEPLOY_BACKEND_PATH }}"
          php artisan db:seed --force --ansi
          Write-Host "Seeder completed."

      # ── 5  File-system permissions ────────────────────────────────────────
      - name: Set IIS permissions on storage & bootstrap/cache
        shell: pwsh
        run: |
          $appPoolUser = "${{ secrets.IIS_APP_POOL_USER }}"
          $paths = @(
              "${{ secrets.DEPLOY_BACKEND_PATH }}\storage",
              "${{ secrets.DEPLOY_BACKEND_PATH }}\bootstrap\cache"
          )
          foreach ($p in $paths) {
              if (-not (Test-Path $p)) {
                  New-Item -ItemType Directory -Path $p -Force | Out-Null
              }
              $acl  = Get-Acl $p
              $rule = New-Object System.Security.AccessControl.FileSystemAccessRule(
                  $appPoolUser,
                  "Modify",
                  "ContainerInherit,ObjectInherit",
                  "None",
                  "Allow"
              )
              $acl.SetAccessRule($rule)
              Set-Acl $p $acl
              Write-Host "Permissions set on: $p"
          }

      # ── 6  Laravel optimisation ──────────────────────────────────────────
      - name: Optimise Laravel (config / route / view cache)
        shell: pwsh
        run: |
          Set-Location "${{ secrets.DEPLOY_BACKEND_PATH }}"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          Write-Host "Laravel cache optimised."

      # ── 7  Restart IIS application pools ─────────────────────────────────
      - name: Restart IIS application pools
        shell: pwsh
        run: |
          Import-Module WebAdministration -ErrorAction Stop
          $pools = @(
              "${{ secrets.IIS_BACKEND_POOL }}",
              "${{ secrets.IIS_FRONTEND_POOL }}"
          )
          foreach ($pool in $pools) {
              if (Test-Path "IIS:\AppPools\$pool") {
                  Restart-WebAppPool -Name $pool
                  Write-Host "Restarted app pool: $pool"
              } else {
                  Write-Warning "App pool not found: $pool"
              }
          }

      # ── 8  Smoke-test ────────────────────────────────────────────────────
      - name: Smoke-test backend health endpoint
        shell: pwsh
        run: |
          $url = "${{ secrets.APP_URL }}/api/v1/health"
          try {
              $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 15
              Write-Host "Health check OK – HTTP $($r.StatusCode)"
          } catch {
              Write-Warning "Health check failed (endpoint may not exist yet): $_"
          }

      # ── 9  Clean up temporary artifacts on runner ─────────────────────────
      - name: Remove downloaded artifacts from runner temp
        if: always()
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "${{ env.BACKEND_ARTIFACT_PATH }}"  -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "${{ env.FRONTEND_ARTIFACT_PATH }}" -ErrorAction SilentlyContinue
          Write-Host "Temporary artifact directories removed."
